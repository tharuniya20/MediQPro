<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--red:#dc2626;--rl:#fef2f2;--rm:#fca5a5;--blue:#1d4ed8;--bl:#eff6ff;--bm:#93c5fd;--green:#16a34a;--gl:#f0fdf4;--bg:#f8fafc;--card:#fff;--text:#0f172a;--muted:#64748b;--border:#e2e8f0;--sh:0 1px 6px rgba(0,0,0,.07)}
[data-theme=dark]{--bg:#0f172a;--card:#1e293b;--text:#f1f5f9;--muted:#94a3b8;--border:#334155;--rl:#3a0a0a;--bl:#0a1628;--gl:#052110}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);display:flex;flex-direction:column;min-height:100vh;font-size:13px}
header{background:var(--red);color:#fff;padding:0 12px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;flex-shrink:0}
.logo{font-size:14px;font-weight:800}.logo span{opacity:.8;font-weight:400;font-size:10px;display:block}
.hbtn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 9px;border-radius:20px;cursor:pointer;font-size:11px;font-weight:600;margin-left:5px}
.sos{background:#fff;color:var(--red);padding:5px 11px;border-radius:20px;font-size:11px;font-weight:800;cursor:pointer;border:none}
.layout{display:flex;flex:1;height:calc(100vh - 50px);overflow:hidden}
aside{width:195px;background:var(--card);border-right:1px solid var(--border);overflow-y:auto;flex-shrink:0}
aside::-webkit-scrollbar{width:3px}aside::-webkit-scrollbar-thumb{background:var(--border)}
.slbl{padding:8px 10px 3px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.7px}
.sbtn{display:flex;align-items:center;gap:7px;width:100%;padding:7px 10px;border:none;background:none;cursor:pointer;border-radius:7px;color:var(--text);font-size:12px;font-weight:500;transition:.15s;margin-bottom:1px}
.sbtn:hover{background:var(--bg)}.sbtn.active{background:var(--rl);color:var(--red);font-weight:700}
.sic{width:24px;height:24px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
main{flex:1;overflow-y:auto;padding:13px}main::-webkit-scrollbar{width:4px}main::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px}
.tabs{display:flex;gap:3px;background:var(--bg);border-radius:9px;padding:3px;margin-bottom:12px}
.tab{flex:1;padding:6px 3px;border:none;background:none;border-radius:7px;cursor:pointer;font-size:11px;font-weight:600;color:var(--muted);transition:.15s}
.tab.active{background:var(--card);color:var(--text);box-shadow:var(--sh)}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:13px;margin-bottom:9px}
.ctitle{font-size:12px;font-weight:700;margin-bottom:9px;display:flex;align-items:center;gap:5px}
.sh{border-radius:12px;padding:11px 13px;margin-bottom:11px;display:flex;align-items:center;gap:9px}
.sh h2{font-size:14px;font-weight:800;margin-bottom:1px}.sh p{font-size:11px;opacity:.8}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin-bottom:9px}
.chip{padding:7px 8px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:11px;cursor:pointer;text-align:left;display:block;width:100%;user-select:none;touch-action:manipulation;transition:border-color .15s,background .15s,color .15s}
.chip:hover,.chip.sel{border-color:var(--red)!important;background:var(--rl)!important;color:var(--red)!important}.chip.sel{font-weight:700}
.uz{border:2px dashed var(--border);border-radius:9px;padding:11px;text-align:center;cursor:pointer;transition:.15s;margin-bottom:7px;position:relative;overflow:hidden}
.uz:hover{border-color:var(--red);background:var(--rl)}.uz input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%}
.pw{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.pi{width:48px;height:48px;border-radius:6px;object-fit:cover;border:1px solid var(--border)}
input[type=text],input[type=date],input[type=time],input[type=tel],select,textarea{width:100%;padding:7px 9px;border:1.5px solid var(--border);border-radius:8px;font-size:12px;background:var(--card);color:var(--text);outline:none;font-family:inherit;transition:.15s;margin-bottom:5px}
input:focus,textarea:focus,select:focus{border-color:var(--red)}
textarea{resize:none;min-height:52px;margin-bottom:5px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:5px}.fr input,.fr select{margin-bottom:0}
.btn{padding:8px 13px;border-radius:8px;border:none;cursor:pointer;font-size:12px;font-weight:700;transition:.15s;display:block;width:100%;margin-bottom:5px}
.btn:active{transform:scale(.97)}
.br{background:var(--red);color:#fff}.br:hover{background:#b91c1c}
.bo{background:none;border:1.5px solid var(--red);color:var(--red)}
.bg2{background:var(--green);color:#fff}.bb{background:var(--blue);color:#fff}
.bsm{width:auto;display:inline-block;padding:4px 9px;font-size:10px;margin-bottom:0}
.cbox{display:flex;flex-direction:column;gap:6px;max-height:240px;overflow-y:auto;margin:5px 0}
.cbox::-webkit-scrollbar{width:3px}.cbox::-webkit-scrollbar-thumb{background:var(--border)}
.bbl{padding:7px 10px;border-radius:10px;font-size:12px;line-height:1.5;max-width:92%;white-space:pre-wrap;word-break:break-word}
.bbl.user{background:var(--red);color:#fff;align-self:flex-end;border-bottom-right-radius:3px}
.bbl.ai{background:var(--bg);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:3px}
.bbl.loading{opacity:.6;font-style:italic}
.cr{display:flex;gap:5px;margin-top:5px}.cr input{flex:1;margin:0}
.cs{background:var(--red);color:#fff;border:none;border-radius:8px;padding:8px 11px;cursor:pointer;font-size:13px;flex-shrink:0}
.hc{border:1px solid var(--border);border-radius:11px;margin-bottom:9px;overflow:hidden;background:var(--card)}
.hh{padding:10px 12px;display:flex;align-items:flex-start;gap:9px;cursor:pointer;transition:.15s}
.hh:hover{background:var(--bg)}
.hb{display:none;border-top:1px solid var(--border)}.hb.open{display:block}
.mf{width:100%;height:180px;border:0;display:block}
.dr{display:flex;justify-content:space-between;align-items:center;padding:7px 12px;border-bottom:1px solid var(--border);font-size:11px;gap:5px}
.dr:last-child{border-bottom:0}
.ay{background:var(--gl);color:var(--green);padding:2px 6px;border-radius:20px;font-size:10px;font-weight:700;flex-shrink:0}
.an{background:#fff7ed;color:#ea580c;padding:2px 6px;border-radius:20px;font-size:10px;font-weight:700;flex-shrink:0}
.aitem{display:flex;justify-content:space-between;align-items:flex-start;padding:8px 10px;background:var(--bg);border-radius:8px;margin-bottom:5px;border-left:3px solid var(--red)}
.ritem{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg);border-radius:8px;margin-bottom:5px;border-left:3px solid var(--blue)}
.db{background:none;border:none;color:var(--muted);cursor:pointer;font-size:12px;padding:2px 4px;flex-shrink:0}.db:hover{color:var(--red)}
.rb{border-radius:10px;padding:11px;margin-top:7px;font-size:12px}
.rb.mild{background:var(--gl);border:1px solid #86efac}
.rb.moderate{background:#fffbeb;border:1px solid #fcd34d}
.rb.critical{background:var(--rl);border:1px solid var(--rm)}
.svbar{height:5px;border-radius:5px;background:var(--border);margin:4px 0;overflow:hidden}
.svfill{height:100%;border-radius:5px;transition:.5s}
/* VOICE BUTTONS */
.vbtn{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:700;cursor:pointer;border:1.5px solid var(--border);transition:.15s;display:inline-flex;align-items:center;gap:6px}
.vbtn.start{background:var(--gl);color:var(--green);border-color:#86efac}
.vbtn.start:hover{background:#dcfce7}
.vbtn.stop{background:var(--rl);color:var(--red);border-color:var(--rm)}
.vbtn.stop:hover{background:#fecaca}

.cbtn{background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.3);color:#fff;padding:9px 6px;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600;transition:.2s;text-align:center}

.overlay.open{display:flex}

.modal .big{font-size:30px;font-weight:800;color:var(--red);letter-spacing:2px;margin:5px 0}
.cbx{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:6px 16px;cursor:pointer;font-size:12px;margin-top:6px;color:var(--text)}
.toast{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);background:#1e293b;color:#fff;padding:7px 15px;border-radius:20px;font-size:12px;z-index:999;opacity:0;transition:.3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
#ss{font-size:11px;padding:5px 8px;margin:6px 8px 3px;width:calc(100% - 16px)}
.mob{display:none}
@media(max-width:580px){aside{position:fixed;left:-205px;top:50px;height:calc(100vh - 50px);z-index:150;transition:.25s;box-shadow:4px 0 14px rgba(0,0,0,.15)}aside.open{left:0}.mob{display:block}.sg{grid-template-columns:1fr 1fr}.cgrid{grid-template-columns:1fr 1fr}}

</head>

function detectGPS(){
  if(!navigator.geolocation){toast('GPS not available. Please select manually.');return;}
  toast('🛰️ Detecting your location…');
  navigator.geolocation.getCurrentPosition(pos=>{
    const lat=pos.coords.latitude,lng=pos.coords.longitude;
    for(const a of AREAS){
      if(lat>=a.lat[0]&&lat<=a.lat[1]&&lng>=a.lng[0]&&lng<=a.lng[1]){
        setArea(a.key,a.short+' (GPS)');return;
      }
    }
    toast('Location outside database. Please select manually.');
  },err=>{toast('GPS denied or failed. Please select your area manually.');});
}

    <div class="dr">

        <button type="button" class="btn br bsm" onclick="qBook('${d.n.replace(/'/g,"\\'")}','${h.name.replace(/'/g,"\\'")}','${h.phone}','${h.booking||''}')">Book</button>
      </div>
    </div>`).join('')}
    <div style="padding:8px 12px;display:flex;flex-wrap:wrap;gap:4px;border-top:1px solid var(--border)">
      ${h.specialties.map(sp=>`<span style="background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:2px 7px;font-size:10px;color:var(--muted)">${sp}</span>`).join('')}
    </div>

</div>`;
}

function togH(bid,aid){const b=document.getElementById(bid),a=document.getElementById(aid);if(!b)return;const o=b.classList.toggle('open');if(a)a.textContent=o?'−':'+';}

function refreshDocs(hid,specId){

  const sel=document.getElementById('qdoc');if(!h||!sel)return;
  const sp=SPECS.find(s=>s.id===specId);

function buildAllH(){

// ── TABS ──────────────────────────────────────────────────────
function stab(btn,id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));btn.classList.add('active');
  ['ts','td','tc'].forEach(t=>{const e=document.getElementById(t);if(e)e.style.display=(t===id?'block':'none');});

// ── IMAGES ───────────────────────────────────────────────────
function addImgs(e){
  Array.from(e.target.files).forEach(f=>{
    uploads.push(f);
    const r=new FileReader();
    r.onload=ev=>{const img=document.createElement('img');img.src=ev.target.result;img.className='pi';const a=document.getElementById('pw');if(a)a.appendChild(img);};
    r.readAsDataURL(f);
  });
  toast(`✅ ${e.target.files.length} image(s) added`);
}

// ── VOICE (FIXED: separate start/stop, always shows live text) ─
function startR(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){toast('Voice not supported. Use Chrome browser.');return;}
  if(isRec) return;
  recog=new SR();
  recog.lang='en-IN';
  recog.continuous=true;
  recog.interimResults=true;

  const vtxt=document.getElementById('vtxt');
  const vdone=document.getElementById('vdone');
  const startbtn=document.getElementById('startbtn');
  const stopbtn=document.getElementById('stopbtn');

  if(vtxt){vtxt.style.display='block';vtxt.textContent='🎙️ Listening… speak now';}
  if(vdone) vdone.style.display='none';
  if(startbtn) startbtn.style.display='none';
  if(stopbtn) stopbtn.style.display='inline-flex';

  let fullText='';

  recog.onresult=e=>{
    let interim='',final_='';
    for(let i=e.resultIndex;i<e.results.length;i++){
      if(e.results[i].isFinal){final_+=e.results[i][0].transcript+' ';}
      else{interim+=e.results[i][0].transcript;}
    }
    if(final_.trim()){
      fullText+=final_.trim()+' ';
      const box=document.getElementById('stxt');
      if(box) box.value=fullText.trim();
    }
    if(vtxt) vtxt.textContent=interim||('🎙️ Heard: '+fullText)||'🎙️ Listening…';
  };

  recog.onerror=e=>{
    toast('Mic error: '+e.error+'. Check browser mic permissions.');
    stopR();
  };

  recog.onend=()=>{if(isRec) stopR();};

  try{
    recog.start();
    isRec=true;
    toast('🎙️ Recording started — speak now');
  } catch(e){
    toast('Could not start mic: '+e.message);
    isRec=false;
    if(startbtn) startbtn.style.display='inline-flex';
    if(stopbtn) stopbtn.style.display='none';
  }
}

function stopR(){
  if(recog){try{recog.stop();}catch(e){}recog=null;}
  isRec=false;
  const startbtn=document.getElementById('startbtn');
  const stopbtn=document.getElementById('stopbtn');
  const vtxt=document.getElementById('vtxt');
  const vdone=document.getElementById('vdone');
  if(startbtn) startbtn.style.display='inline-flex';
  if(stopbtn) stopbtn.style.display='none';
  if(vtxt) vtxt.style.display='none';
  const box=document.getElementById('stxt');
  if(vdone){
    vdone.style.display='block';
    vdone.textContent=box?.value?'✅ Voice transcribed: "'+box.value.substring(0,60)+(box.value.length>60?'…':'')+'"':'⚠️ Nothing was detected. Try speaking clearly or type your symptoms.';
  }
  toast('⏹ Recording stopped');
}

// ── AI ANALYZE ────────────────────────────────────────────────
async function analyze(){
  const ext=document.getElementById('stxt')?.value.trim()||'';
  const hc=selSyms.length>0,ht=ext.length>0,hp=uploads.length>0,hv=!!recBlob;
  if(!hc&&!ht&&!hp&&!hv){toast('Select a symptom, describe, upload a photo, or record a voice note.');return;}
  const btn=document.getElementById('abtn');btn.textContent='⏳ Analyzing…';btn.disabled=true;
  const sl=selSyms.length?selSyms.join(', '):ext;
  const prompt=`You are a ${curSpec.name} specialist AI for Indian patients.
Symptoms: "${sl}".${hp?` Patient uploaded ${uploads.length} image(s).`:''}${hv?' Patient provided voice description.':''}
Extra: "${ext}".
Respond ONLY with JSON (no markdown, no extra text):
{"condition":"condition name","severity":"mild|moderate|critical","explanation":"2-3 clear sentences","action":"immediate step-by-step actions","specialist_needed":true|false,"warning_signs":["s1","s2","s3"],"home_care":"one tip","call_ambulance":false}`;
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:prompt}]})});
    const data=await res.json();
    if(data.error) throw new Error(data.error.message);
    const raw=data.content.map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();
    const mx=raw.match(/\{[\s\S]*\}/);if(!mx)throw new Error('Invalid AI response');
    const r=JSON.parse(mx[0]);
    showResult(r);logS('check',r.severity==='critical');logH(`🩺 ${curSpec.name}: ${r.condition} (${r.severity})`);
  }catch(err){
    const msg=err.message||'';
    let friendly='';
    if(msg.includes('exceeded_limit')||msg.includes('rate_limit')||msg.includes('overload')){
      friendly=`<b>⏳ AI Usage Limit Reached</b><br>
<span style="font-size:11px">The AI has hit its 5-hour usage limit. Please try again after <b>some time</b> (usually resets within 1–2 hours).<br><br>
Meanwhile:<br>
• Select your symptoms above and tap <b>Find Nearby Hospitals</b><br>
• Call <b>108</b> for emergencies<br>
• Use the AI Chat tab for simpler questions</span>`;
    } else if(msg.includes('network')||msg.includes('fetch')||msg.toLowerCase().includes('failed')){
      friendly=`<b>⚠️ No Internet Connection</b><br><span style="font-size:11px">Please check your Wi-Fi or mobile data and try again.</span>`;
    } else {
      friendly=`<b>⚠️ AI Unavailable</b><br><span style="font-size:11px">${msg||'Unexpected error. Please try again.'}</span>`;
    }
    document.getElementById('ao').innerHTML=`<div class="rb moderate">${friendly}<br><br><button type="button" class="btn br bsm" style="margin-top:4px" onclick="stab(document.querySelectorAll('.tab')[1],'td')">🏥 Find Nearby Hospitals</button> &nbsp; <button type="button" class="btn bsm" style="background:#1d4ed8;color:#fff;margin-top:4px" onclick="call('108','Ambulance')">🚑 Call 108</button></div>`;
  }
  btn.textContent='🤖 Analyze with AI';btn.disabled=false;
}

function showResult(r){
  const p={mild:22,moderate:58,critical:95},c={mild:'#22c55e',moderate:'#f59e0b',critical:'#ef4444'};
  const w=r.warning_signs?.length?`<div style="margin-top:6px"><b>⚠️ Watch for:</b><ul style="padding-left:13px;margin-top:2px">${r.warning_signs.map(s=>`<li style="margin-bottom:1px">${s}</li>`).join('')}</ul></div>`:'';
  document.getElementById('ao').innerHTML=`
<div class="rb ${r.severity}">
  <span style="display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:800;background:${c[r.severity]}22;color:${c[r.severity]}">${r.severity.toUpperCase()}</span>
  <div class="svbar"><div class="svfill" style="width:${p[r.severity]}%;background:${c[r.severity]}"></div></div>
  <p style="font-weight:700;font-size:12px;margin:4px 0 3px">🔍 ${r.condition}</p>
  <p style="font-size:12px">${r.explanation}</p>
  <div style="background:rgba(0,0,0,.06);border-radius:6px;padding:7px;margin-top:5px"><b style="font-size:11px">📋 Action:</b><p style="font-size:12px;margin-top:2px">${r.action}</p></div>
  ${r.home_care?`<p style="font-size:11px;color:var(--muted);margin-top:4px">🏠 ${r.home_care}</p>`:''}
  ${w}
  ${r.specialist_needed?`<button type="button" class="btn bo bsm" style="margin-top:6px" onclick="stab(document.querySelectorAll('.tab')[1],'td')">🏥 Find Nearby Hospitals</button>`:''}
  ${r.call_ambulance?`<button type="button" class="btn br" style="margin-top:5px" onclick="call('108','Ambulance')">🚑 Call 108 Now</button>`:''}
</div>`;
}

// ── AI CHAT ───────────────────────────────────────────────────
async function chat(){
  const inp=document.getElementById('ci');const q=inp.value.trim();if(!q)return;
  inp.value='';const id=curSpec.id;
  chatH[id]=chatH[id]||[];chatH[id].push({role:'user',content:q});
  addB('ch',q,'user');addB('ch','Thinking…','ai loading');
  try{
    const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,
        system:`You are a helpful ${curSpec.name} specialist AI for Indian patients. Be concise and practical. No markdown.`,
        messages:chatH[id].map(m=>({role:m.role,content:m.content}))})});
    const data=await res.json();if(data.error)throw new Error(data.error.message);
    const rep=data.content.map(i=>i.text||'').join('').trim();
    rmL('ch');addB('ch',rep,'ai');chatH[id].push({role:'assistant',content:rep});sv('mq_ch',chatH);
  }catch(err){
    rmL('ch');
    const msg=err.message||'';
    const txt=msg.includes('exceeded_limit')||msg.includes('rate_limit')
      ?'⏳ AI usage limit reached. Please wait 1–2 hours and try again. You can still browse hospitals and call 108.'
      :'⚠️ '+(msg||'AI unavailable. Please try again.');
    addB('ch',txt,'ai');
  }
}
function addB(id,msg,type){const w=document.getElementById(id);if(!w)return;const d=document.createElement('div');d.className='bbl '+type;d.textContent=msg;w.appendChild(d);w.scrollTop=w.scrollHeight;}
function rmL(id){const w=document.getElementById(id);if(!w)return;const l=w.querySelector('.bbl.loading');if(l)w.removeChild(l);}

// ── BOOK ──────────────────────────────────────────────────────
function qBook(dn,hn,ph,bu){
  const nm=prompt('Your name (for local reminder):');if(!nm)return;
  const dt=prompt('Preferred date (e.g. 15/06/2025):');if(!dt)return;
  appts.unshift({id:Date.now(),doctor:dn,hospital:hn,area:AREAS.find(a=>a.key===areaKey)?.short,phone:ph,bookingUrl:bu,date:dt,time:'OPD',patient:nm});
  sv('mq_ap',appts);logS('appt');logH(`📅 Booked: ${dn} at ${hn}`);
  toast('✅ Reminder saved locally');
  if(bu&&confirm(`Open ${hn}'s official booking page to actually confirm?`))window.open(bu,'_blank');
}
function bookForm(){
  const nm=gv('qn'),ph=gv('qp'),dt=gv('qd'),tm=gv('qt'),hid=gv('qh'),doc=gv('qdoc');
  if(!nm||!dt){toast('Enter your name and date.');return;}
  const h=Object.values(DB).flat().find(x=>x.id===hid)||(DB[areaKey]||[])[0];if(!h)return;
  appts.unshift({id:Date.now(),doctor:doc,hospital:h.name,area:AREAS.find(a=>a.key===areaKey)?.short,phone:h.phone,bookingUrl:h.booking,date:dt,time:tm,patient:nm});
  sv('mq_ap',appts);logS('appt');logH(`📅 Reminder: ${doc} at ${h.name}`);
  toast('✅ Reminder saved locally!');
  document.getElementById('qn').value='';document.getElementById('qd').value='';document.getElementById('qt').value='';
  if(confirm(`Open ${h.name}'s official booking portal to confirm your appointment?`))window.open(h.booking,'_blank');
}
function delA(id){appts=appts.filter(a=>a.id!==id);sv('mq_ap',appts);show('appts');}
function buildAppts(){
  const it=appts.length?appts.map(a=>`<div class="aitem"><div style="flex:1;min-width:0"><b style="font-size:11px">👨‍⚕️ ${a.doctor}</b><div style="font-size:10px;color:var(--muted)">🏥 ${a.hospital}${a.area?' · '+a.area:''}</div><div style="font-size:10px;color:var(--muted)">📅 ${a.date}${a.time?' at '+a.time:''} · ${a.patient}</div><div style="display:flex;gap:4px;margin-top:3px;flex-wrap:wrap">${a.phone?`<button type="button" onclick="call('${a.phone}','${a.hospital}')" style="background:var(--green);color:#fff;border:none;border-radius:5px;padding:2px 8px;font-size:10px;cursor:pointer;font-weight:600">📞 Call</button>`:''} ${a.bookingUrl?`<a href="${a.bookingUrl}" target="_blank" style="background:var(--blue);color:#fff;border-radius:5px;padding:2px 8px;font-size:10px;text-decoration:none;font-weight:600">🌐 Book Online</a>`:''}</div></div><button class="db" onclick="delA(${a.id})">✕</button></div>`).join(''):'<p style="color:var(--muted);font-size:12px">No appointments yet.</p>';
  return `<div class="card">${CLOC}<div class="ctitle">📅 My Appointment Reminders (${appts.length})</div><div class="warn" style="margin-bottom:8px">📌 These are <b>local reminders only</b>. Use "Book Online" to actually confirm with the hospital.</div>${it}</div>`;
}

// ── REMINDERS ─────────────────────────────────────────────────
function addR(){
  const n=gv('rn'),t=gv('rt'),f=gv('rf'),no=gv('rno');
  if(!n||!t){toast('Enter medicine name and time.');return;}
  rems.push({id:Date.now(),name:n,time:t,freq:f,notes:no});sv('mq_re',rems);
  logH(`💊 Reminder: ${n} at ${t}`);toast('✅ Reminder added!');schedN(n,t);show('rems');
}
function delR(id){rems=rems.filter(r=>r.id!==id);sv('mq_re',rems);show('rems');}
function schedN(n,t){if(!('Notification' in window))return;Notification.requestPermission().then(p=>{if(p!=='granted')return;const[h,m]=t.split(':').map(Number),now=new Date(),dt=new Date();dt.setHours(h,m,0,0);let d=dt-now;if(d<0)d+=86400000;setTimeout(()=>new Notification('💊 Reminder',{body:`Time to take ${n}`}),d);});}
function buildRems(){
  const it=rems.length?rems.map(r=>`<div class="ritem"><div><b style="font-size:11px">💊 ${r.name}</b><div style="font-size:10px;color:var(--muted)">⏰ ${r.time} · ${r.freq}${r.notes?' · '+r.notes:''}</div></div><button class="db" onclick="delR(${r.id})">✕</button></div>`).join(''):'<p style="color:var(--muted);font-size:12px">No reminders.</p>';
  return `<div class="card"><div class="ctitle">💊 Add Reminder</div><input type="text" id="rn" placeholder="Medicine name"><div class="fr"><input type="time" id="rt"><select id="rf"><option>Once daily</option><option>Twice daily</option><option>Thrice daily</option><option>After meals</option><option>Before meals</option><option>As needed</option></select></div><input type="text" id="rno" placeholder="Notes (optional)"><button type="button" class="btn bg2" onclick="addR()">+ Add Reminder</button></div><div class="card"><div class="ctitle">📋 Active Reminders (${rems.length})</div>${it}</div>`;
}

// ── DASHBOARD ─────────────────────────────────────────────────
function buildDB(){
  const h=actH.length?actH.slice(0,15).map(x=>`<div class="hi"><div style="color:var(--muted);font-size:10px">${x.t}</div><div>${x.m}</div></div>`).join(''):'<p style="color:var(--muted);font-size:12px">No activity yet.</p>';
  return `<div class="sg"><div class="sc"><div class="sn">${stats.checks||0}</div><div class="sl">AI Checks</div></div><div class="sc"><div class="sn">${appts.length}</div><div class="sl">Reminders</div></div><div class="sc"><div class="sn" style="color:var(--red)">${stats.critical||0}</div><div class="sl">Critical</div></div><div class="sc"><div class="sn">${rems.length}</div><div class="sl">Meds</div></div></div><div class="card"><div class="ctitle">📈 Activity History</div>${h}</div><div class="card">${CLOC}<button type="button" class="btn bo" onclick="clearAll()">🗑️ Clear All Data</button></div>`;
}
function clearAll(){actH=[];stats={checks:0,critical:0,appts:0,sos:0};['mq_ah','mq_st','mq_ch','mq_ap','mq_re'].forEach(k=>localStorage.removeItem(k));appts=[];rems=[];chatH={};show('dashboard');toast('Cleared.');}

// ── UTILS ─────────────────────────────────────────────────────
function logS(type,isCrit=false){if(type==='check'){stats.checks=(stats.checks||0)+1;if(isCrit)stats.critical=(stats.critical||0)+1;}if(type==='appt')stats.appts=(stats.appts||0)+1;if(type==='sos')stats.sos=(stats.sos||0)+1;sv('mq_st',stats);}
function logH(msg){actH.unshift({t:new Date().toLocaleString('en-IN'),m:msg});if(actH.length>50)actH.pop();sv('mq_ah',actH);}
function sv(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
function gv(id){const e=document.getElementById(id);return e?e.value.trim():'';}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function call(num,label){document.getElementById('ctitle').textContent='Call '+label;document.getElementById('cdesc').textContent='Dial from your phone:';document.getElementById('cnum').textContent=num;document.getElementById('clink').href='tel:'+num;document.getElementById('clink').textContent='📞 Call '+num;document.getElementById('cmodal').classList.add('open');logS('sos');logH('🆘 SOS: '+num);}
function closeM(id){document.getElementById(id).classList.remove('open');}
document.getElementById('cmodal').addEventListener('click',function(e){if(e.target===this)this.classList.remove('open');});
function toast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2600);}
function toggleTheme(){const d=document.body.dataset.theme==='dark';document.body.dataset.theme=d?'light':'dark';document.getElementById('tmbtn').textContent=d?'🌙':'☀️';}

// ── INIT ──────────────────────────────────────────────────────
const saved=localStorage.getItem('mq_area');
if(saved&&DB[saved]){areaKey=saved;locDetected=true;const al=AREAS.find(a=>a.key===saved);document.getElementById('clbl').textContent='📍 '+(al?.short||saved);}
buildSB();
if(locDetected)show('specialty');else showLocPicker();

new MutationObserver(()=>{
  document.querySelectorAll('.chip:not([data-b])').forEach(btn=>{
    btn.setAttribute('data-b','1');
    btn.addEventListener('click',function(e){
      e.stopPropagation();
      const sym=this.dataset.sym;
      if(selSyms.includes(sym)){selSyms=selSyms.filter(s=>s!==sym);this.classList.remove('sel');}
      else{selSyms.push(sym);this.classList.add('sel');}
    });
  });
}).observe(document.getElementById('main'),{childList:true,subtree:true});
</script>
